name: Track Karma Points

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:  # Allow manual trigger

jobs:
  track-karma:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run karma tracker
      env:
        HN_USER_ID: ${{ secrets.HN_USER_ID }}
      run: python src/karma_tracker.py

    - name: Generate plot
      run: python src/plot_generator.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/karma_history.json images/karma_plot.png

        # Check if last commit was made by this action
        LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
        LAST_COMMIT_AUTHOR=$(git log -1 --pretty=%an)

        if [ "$LAST_COMMIT_MSG" = "Update karma history and plot" ] && [ "$LAST_COMMIT_AUTHOR" = "GitHub Action" ]; then
          # Amend the last commit instead of creating a new one
          git commit --amend --no-edit || exit 0
          git push --force-with-lease
        else
          # Create a new commit (first time or after manual commits)
          git commit -m "Update karma history and plot" || exit 0
          git push
        fi
